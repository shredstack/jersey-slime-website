<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Confirm your email</title>
</head>
<body style="margin:0;padding:0;background-color:#fdf4ff;font-family:system-ui,-apple-system,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="padding:40px 16px;">
    <tr>
      <td align="center">
        <table width="100%" cellpadding="0" cellspacing="0" style="max-width:480px;background:#ffffff;border-radius:16px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.06);">

          <!-- Header -->
          <tr>
            <td style="background:linear-gradient(135deg,#FF6B9D,#C084FC);padding:32px 24px;text-align:center;">
              <div style="font-size:40px;margin-bottom:6px;">🧪</div>
              <p style="margin:0;color:#ffffff;font-size:22px;font-weight:700;letter-spacing:-0.3px;">Jersey Slime Studio 38</p>
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td style="padding:32px 24px;text-align:center;">
              <h1 style="margin:0 0 12px;font-size:20px;font-weight:700;color:#1a1a1a;">Confirm your email</h1>
              <p style="margin:0 0 28px;font-size:15px;color:#555;line-height:1.5;">
                One quick click and you're ready to book slime experiences, manage orders, and more.
              </p>
              <a href="{{ .ConfirmationURL }}"
                style="display:inline-block;background:linear-gradient(135deg,#FF6B9D,#C084FC);color:#ffffff;font-size:15px;font-weight:600;text-decoration:none;padding:14px 32px;border-radius:50px;">
                Confirm my email
              </a>
              <p style="margin:24px 0 0;font-size:12px;color:#aaa;">
                Link expires in 24 hours. Didn't sign up? You can safely ignore this email.
              </p>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="background:#5EEAD4;padding:14px 24px;text-align:center;">
              <p style="margin:0;font-size:12px;color:#065f46;font-weight:500;">Jersey Slime Studio 38 · Utah's favorite slime experience</p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
